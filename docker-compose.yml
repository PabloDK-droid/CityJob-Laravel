version: '3.8'

services:
  app:
    build: .
    container_name: cityjob_app
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: CityJob
      DB_USERNAME: postgres
      DB_PASSWORD: root

  postgres:
    image: postgres:latest
    container_name: cityjob_db
    environment:
      POSTGRES_DB: CityJob
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
