services:
  app:
    build: .
    container_name: cityjob_app
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: CityJob
      DB_USERNAME: postgres
      DB_PASSWORD: root

  postgres:
    image: postgres:latest
    container_name: cityjob_db
    environment:
      POSTGRES_DB: CityJob
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - node-exporter